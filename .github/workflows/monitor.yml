name: SEC Form 144 Real-time Monitor

on:
  schedule:
    # 1. 周一：从美东早 4 点开始 (UTC 08:00) 直到深夜
    - cron: '*/15 8-23 * * 1'
    
    # 2. 周二、周三、周四、周五：全天 24 小时不停歇运行
    - cron: '*/15 * * * 2-5'
    
    # 3. 周六：运行到美东周五晚 9 点 (UTC 周六 01:00) 结束
    # 00:00, 00:15, 00:30, 00:45 UTC 对应美东周五晚 8:00-8:45 PM
    - cron: '*/15 0 * * 6'

  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        # 注意这里：去掉了 set 和 up 之间的横杠
        uses: actions/setup-python@v4 
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install feedparser curl_cffi requests

      - name: Execute Script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: python monitor.py

      - name: Sync Cache to Repo
        run: |
          git config --global user.name "Bot-Monitor"
          git config --global user.email "bot@monitor.com"
          git add seen_ids.txt
          git commit -m "chore: update seen_ids [skip ci]" || exit 0
          git push
