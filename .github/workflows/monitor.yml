name: SEC Form 144 Real-time Monitor

on:
  schedule:
    # 每10分钟一次，周一至周五，涵盖美东 4:00-20:00 (UTC 8:00-00:00)
    - cron: '*/10 8-23,0 * * 1-5'
  workflow_dispatch: 

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        # 注意这里：去掉了 set 和 up 之间的横杠
        uses: actions/setup-python@v4 
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install feedparser curl_cffi requests

      - name: Execute Script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: python monitor.py

      - name: Sync Cache to Repo
        run: |
          git config --global user.name "Bot-Monitor"
          git config --global user.email "bot@monitor.com"
          git add seen_ids.txt
          git commit -m "chore: update seen_ids [skip ci]" || exit 0
          git push
