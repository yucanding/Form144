name: SEC Form 144 Real-time Monitor

on:
  # 内部定时器已停用，现在由外部 cron-job.org 通过 API 唤醒
  # schedule:
  #   - cron: '*/15 8-23 * * 1'
  #   - cron: '*/15 * * * 2-5'
  #   - cron: '*/15 0 * * 6'

  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4 
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install feedparser curl_cffi requests yfinance beautifulsoup4

      - name: Execute Script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: python monitor.py

      - name: Sync Cache to Repo
        run: |
          git config --global user.name "Bot-Monitor"
          git config --global user.email "bot@monitor.com"
          git add seen_ids.txt
          git commit -m "chore: update seen_ids [skip ci]" || exit 0
          git push
